# --- TEXTO INTRODUCCIÓN ---
intro_escena_1=Año XXXX. Lo que comenzó como la mayor revolución tecnológica de la historia terminó siendo nuestra sentencia... Tras el evento conocido como el 'Amanecer de las Mentes de Silicio', la sociedad y cadenas de montaje dependen del agua.
intro_escena_2=Así que te han enviado a ti, nuestro Agente de Transporte y Logística Aeroespacial Sintiente, abreviado como Atlas modelo M.O.N.O. al espacio para recoger un nuevo recurso descubierto recientemente: Partículas de Procesado.
intro_escena_3=Maia: Bien, te hago entrega de la terminal. Esta controla nuestra nave y maneja el gancho de recolección. Hemos encontrado un suministro repartido por la galaxia al que hemos bautizado como Partículas de Procesado, un sustituto para hacer funcionar nuestras máquinas en la Tierra. Tu misión es reunir suficientes para volver a restablecer nuestra sociedad.
intro_escena_4=Maia: A través de su interfaz deberás recolectar PP interactuando con el núcleo de energía, adquirir módulos de procesamiento y estructuras automatizadas que trabajen por ti.
intro_escena_5=Has recibido un ATLAS M.O.N.O.

