# --- INTRODUCTION TEXT ---
intro_escena_1=Year XXXX. What began as the greatest technological revolution in history ended up being our sentence... After the event known as the 'Dawn of the Silicon Minds', society and assembly lines depend on water.
intro_escena_2=So you have been sent, our Sentient Aerospace Transport and Logistics Agent, abbreviated as Atlas model M.O.N.O. into space to collect a newly discovered resource: Processing Particles.
intro_escena_3=Maia: Well, I'm handing over the terminal to you. It controls our ship and handles the harvesting hook. We've found a supply scattered across the galaxy that we've dubbed Processing Particles, a substitute to keep our machines running on Earth. Your mission is to gather enough to restore our society.
intro_escena_4=Maia: Through its interface you must collect PP by interacting with the energy core, acquiring processing modules and automated structures that work for you.
intro_escena_5=You have received an ATLAS M.O.N.O.
boton_skip=Skip intro

